app = "roommate-match"
primary_region = "sin"

[build]
  builder = "heroku/buildpacks:20"

[env]
  OPENAI_API_KEY = ""

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  internal_port = 8000
  processes = ["app"]
  protocol = "tcp"
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

[[services.ports]]
  handlers = ["http"]
  port = 80
  force_https = true

[[services.ports]]
  handlers = ["tls", "http"]
  port = 443

[services]
  [services.app]
    command = "uvicorn main:app --host 0.0.0.0 --port 8000"