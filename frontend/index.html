<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .tab-active {
            background-color: #2563eb;
            color: white;
        }
        .tab-inactive {
            background-color: #e5e7eb;
            color: #374151;
        }
        .tab-inactive:hover {
            background-color: #d1d5db;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.6); }
        }
        
        .animate-pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .dark .glass-effect {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .floating-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

        // Tab switching functionality
        function switchTab(tabId) {
            // Update tab styles
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.className = btn.className.replace('tab-active', 'tab-inactive');
            });
            document.getElementById(tabId).className = document.getElementById(tabId).className.replace('tab-inactive', 'tab-active');

            // Load content
            const contentKey = tabId.replace('tab-', '');
            document.getElementById('content').innerHTML = tabContents[contentKey];
            lucide.createIcons();

            // Setup form handlers
            if (contentKey === 'search') setupSearch();
            if (contentKey === 'post') setupPost();
            if (contentKey === 'matches') loadMatches();
        }

        // Dark mode toggle
        function toggleTheme() {
            const html = document.documentElement;
            const themeIcon = document.querySelector('#theme-toggle i');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeIcon.setAttribute('data-lucide', 'sun');
            } else {
                html.classList.add('dark');
                themeIcon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
            
            // Save preference
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        // Load saved theme
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.querySelector('#theme-toggle i').setAttribute('data-lucide', 'moon');
            }
        }

        function setupSearch() {
            document.getElementById('searchForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Show loading state
                const resultsDiv = document.getElementById('results');
                resultsDiv.innerHTML = `
                    <div class="flex items-center justify-center py-12">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        <span class="ml-3 text-gray-600 dark:text-gray-300">Finding your perfect matches...</span>
                    </div>
                `;
                
                const budget = document.getElementById('budget').value;
                const lifestyle = document.getElementById('lifestyle').value;
                const urgency = document.getElementById('urgency').value;
                const location = document.getElementById('location').value;

                try {
                    const response = await fetch('/match', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ budget: parseInt(budget), lifestyle, urgency, location })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const matches = await response.json();

                    if (matches.length === 0) {
                        resultsDiv.innerHTML = `
                            <div class="text-center py-12">
                                <i data-lucide="search-x" class="w-16 h-16 text-gray-400 mx-auto mb-4"></i>
                                <h3 class="text-xl font-semibold text-gray-800 dark:text-white mb-2">No matches found</h3>
                                <p class="text-gray-600 dark:text-gray-300 mb-4">Try adjusting your budget or preferences.</p>
                                <button onclick="document.getElementById('searchForm').scrollIntoView()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition duration-200">
                                    Adjust Search
                                </button>
                            </div>
                        `;
                    } else {
                        resultsDiv.innerHTML = matches.map((match, index) => `
                            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-6 shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-fade-in" style="animation-delay: ${index * 0.1}s">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="flex-1">
                                        <div class="flex items-center mb-2">
                                            <h3 class="text-xl font-bold text-gray-800 dark:text-white mr-3">${match.listing.location}</h3>
                                            <span class="px-3 py-1 bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200 rounded-full text-sm font-medium">
                                                ${match.listing.urgency}
                                            </span>
                                        </div>
                                        <p class="text-3xl font-bold text-blue-600 dark:text-blue-400 mb-2">₹${match.listing.rent.toLocaleString()}<span class="text-sm font-normal text-gray-500">/month</span></p>
                                        <div class="flex items-center space-x-4 text-sm text-gray-600 dark:text-gray-300 mb-3">
                                            <span class="flex items-center">
                                                <i data-lucide="users" class="w-4 h-4 mr-1"></i>
                                                ${match.listing.num_roommates} roommates
                                            </span>
                                            <span class="flex items-center">
                                                <i data-lucide="map-pin" class="w-4 h-4 mr-1"></i>
                                                ${match.listing.vacancy_count} vacancy
                                            </span>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <div class="inline-flex items-center px-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-lg font-semibold text-lg">
                                            <i data-lucide="star" class="w-5 h-5 mr-1"></i>
                                            ${Math.round(match.score)}%
                                        </div>
                                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Match Score</p>
                                    </div>
                                </div>
                                
                                <p class="text-gray-700 dark:text-gray-300 mb-4 leading-relaxed">${match.listing.description}</p>
                                
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${match.listing.lifestyle_tags.split(', ').map(tag => 
                                        `<span class="inline-flex items-center px-3 py-1 bg-gradient-to-r from-indigo-100 to-purple-100 dark:from-indigo-900 dark:to-purple-900 text-indigo-800 dark:text-indigo-200 rounded-full text-sm font-medium">
                                            <i data-lucide="tag" class="w-3 h-3 mr-1"></i>
                                            ${tag}
                                        </span>`
                                    ).join('')}
                                </div>
                                
                                <div class="flex justify-between items-center pt-4 border-t border-gray-200 dark:border-gray-700">
                                    <div class="text-sm text-gray-600 dark:text-gray-400">
                                        <i data-lucide="info" class="w-4 h-4 inline mr-1"></i>
                                        ${match.explanation}
                                    </div>
                                    <div class="flex space-x-2">
                                        <button onclick="saveListing(event, ${match.listing.id})" class="flex items-center px-4 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg transition duration-200">
                                            <i data-lucide="bookmark" class="w-4 h-4 mr-1"></i>
                                            Save
                                        </button>
                                        <button onclick="connect('${match.listing.contact_info}', '${match.listing.location}')" class="flex items-center px-6 py-2 bg-gradient-to-r from-green-500 to-blue-600 hover:from-green-600 hover:to-blue-700 text-white rounded-lg transition duration-200 font-medium">
                                            <i data-lucide="message-circle" class="w-4 h-4 mr-2"></i>
                                            Connect
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                        lucide.createIcons();
                    }
                } catch (error) {
                    console.error('Search error:', error);
                    resultsDiv.innerHTML = `
                        <div class="text-center py-12">
                            <i data-lucide="alert-triangle" class="w-16 h-16 text-red-400 mx-auto mb-4"></i>
                            <h3 class="text-xl font-semibold text-gray-800 dark:text-white mb-2">Search temporarily unavailable</h3>
                            <p class="text-gray-600 dark:text-gray-300 mb-4">Please try again in a moment or check your connection.</p>
                            <button onclick="setupSearch(); document.getElementById('searchForm').dispatchEvent(new Event('submit'))" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition duration-200">
                                <i data-lucide="refresh-cw" class="w-4 h-4 mr-1 inline"></i>
                                Retry Search
                            </button>
                        </div>
                    `;
                    lucide.createIcons();
                }
            });
        }

        function setupPost() {
            document.getElementById('postForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const listing = {
                    id: Date.now(),
                    location: document.getElementById('location').value,
                    rent: parseInt(document.getElementById('rent').value),
                    deposit: parseInt(document.getElementById('deposit').value),
                    num_roommates: parseInt(document.getElementById('numRoommates').value),
                    vacancy_count: parseInt(document.getElementById('vacancy').value),
                    lifestyle_tags: document.getElementById('tags').value,
                    contact_info: document.getElementById('contact').value,
                    urgency: document.getElementById('urgency').value,
                    trust_score: 85, // Mock trust score
                    description: document.getElementById('description').value
                };

                try {
                    const response = await fetch('/listings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(listing)
                    });

                    if (response.ok) {
                        alert('Listing posted successfully!');
                        document.getElementById('postForm').reset();
                    } else {
                        alert('Error posting listing. Please try again.');
                    }
                } catch (error) {
                    alert('Error posting listing. Please check your connection.');
                }
            });
        }

        function loadMatches() {
            // This would load user's saved matches
            document.getElementById('matchesList').innerHTML = '<div class="text-center text-gray-500 py-8">Your matches will appear here after searching.</div>';
        }

        function connect(contact, location) {
            // Enhanced connection with location info
            const message = `Hi! I'm interested in your ${location} listing. Can we discuss the details?`;
            const whatsappUrl = `https://wa.me/${contact.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(message)}`;
            
            // Show a nice modal instead of alert
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md mx-4 shadow-2xl">
                    <div class="text-center">
                        <div class="w-16 h-16 bg-green-100 dark:bg-green-900 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i data-lucide="message-circle" class="w-8 h-8 text-green-600 dark:text-green-400"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-2">Connect with Roommate</h3>
                        <p class="text-gray-600 dark:text-gray-300 mb-6">Ready to start a conversation about the ${location} listing?</p>
                        <div class="flex space-x-3">
                            <button onclick="this.closest('.fixed').remove()" class="flex-1 px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition duration-200">
                                Cancel
                            </button>
                            <a href="${whatsappUrl}" target="_blank" onclick="this.closest('.fixed').remove()" class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition duration-200 flex items-center justify-center">
                                <i data-lucide="message-circle" class="w-4 h-4 mr-2"></i>
                                WhatsApp
                            </a>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();
        }

        function saveListing(event, listingId) {
            // Save to localStorage for demo
            let saved = JSON.parse(localStorage.getItem('savedListings') || '[]');
            const button = event.target.closest('button');
            const originalText = button.innerHTML;

            if (!saved.includes(listingId)) {
                saved.push(listingId);
                localStorage.setItem('savedListings', JSON.stringify(saved));
                
                button.innerHTML = '<i data-lucide="check" class="w-4 h-4 mr-1"></i> Saved!';
                button.classList.add('bg-green-100', 'dark:bg-green-900', 'text-green-700', 'dark:text-green-300');
                button.classList.remove('bg-gray-100', 'dark:bg-gray-700', 'hover:bg-gray-200', 'dark:hover:bg-gray-600', 'text-gray-700', 'dark:text-gray-300');
                lucide.createIcons();
                
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.classList.remove('bg-green-100', 'dark:bg-green-900', 'text-green-700', 'dark:text-green-300');
                    button.classList.add('bg-gray-100', 'dark:bg-gray-700', 'hover:bg-gray-200', 'dark:hover:bg-gray-600', 'text-gray-700', 'dark:text-gray-300');
                    lucide.createIcons();
                }, 2000);
            } else {
                // Already saved - unsave
                saved = saved.filter(id => id !== listingId);
                localStorage.setItem('savedListings', JSON.stringify(saved));
                
                button.innerHTML = '<i data-lucide="bookmark-x" class="w-4 h-4 mr-1"></i> Unsaved';
                button.classList.add('bg-red-100', 'dark:bg-red-900', 'text-red-700', 'dark:text-red-300');
                button.classList.remove('bg-gray-100', 'dark:bg-gray-700', 'hover:bg-gray-200', 'dark:hover:bg-gray-600', 'text-gray-700', 'dark:text-gray-300');
                lucide.createIcons();
                
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.classList.remove('bg-red-100', 'dark:bg-red-900', 'text-red-700', 'dark:text-red-300');
                    button.classList.add('bg-gray-100', 'dark:bg-gray-700', 'hover:bg-gray-200', 'dark:hover:bg-gray-600', 'text-gray-700', 'dark:text-gray-300');
                    lucide.createIcons();
                }, 2000);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            switchTab('tab-search');

            // Tab event listeners
            document.getElementById('tab-search').addEventListener('click', () => switchTab('tab-search'));
            document.getElementById('tab-post').addEventListener('click', () => switchTab('tab-post'));
            document.getElementById('tab-matches').addEventListener('click', () => switchTab('tab-matches'));
            document.getElementById('tab-saved').addEventListener('click', () => switchTab('tab-saved'));
            document.getElementById('tab-chat').addEventListener('click', () => switchTab('tab-chat'));
            document.getElementById('tab-notifications').addEventListener('click', () => switchTab('tab-notifications'));
            
            // Theme toggle
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        });
    </script>
</body>
</html>
